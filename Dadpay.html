<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DadPay | Premium Interest</title>
    <style>
        :root {
            --bg: #020204;
            /* Obsidian Tint: 40% opacity for better transparency */
            --glass: rgba(10, 10, 15, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
            /* Dark midnight hues for the lava lamp */
            --b1: #3d1c23; --b2: #1a3538; --b3: #3b3524;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
            color: #ffffff; /* Universal white text */
        }

        /* --- PERFORMANCE: STATIC GRAIN (0% CPU) --- */
        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* --- GPU-ACCELERATED LAVA LAMP --- */
        .lava-wrap {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
            filter: blur(50px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            will-change: transform; /* Offloads animation to GPU/Graphics Card */
            animation: drift 30s infinite ease-in-out alternate;
        }

        .b1 { width: 450px; height: 450px; background: var(--b1); top: 5%; left: 5%; }
        .b2 { width: 550px; height: 550px; background: var(--b2); bottom: 5%; right: 5%; animation-delay: -5s; }
        .b3 { width: 350px; height: 350px; background: var(--b3); top: 45%; left: 25%; animation-delay: -10s; }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(10vw, 10vh); }
        }

        /* --- OBSIDIAN TINTED GUI --- */
        .card {
            position: relative;
            z-index: 50;
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 35px;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .group { margin-bottom: 25px; text-align: left; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover { background: #e0e0e0; }

        /* --- RESULTS PAGE --- */
        #res-page { display: none; }

        .total {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: -3px;
            color: #ffffff; /* Pure white result */
        }

        .details {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            text-align: left;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .row span:first-child { color: rgba(255,255,255,0.35); font-size: 0.85rem; }
        .row span:last-child { color: #fff; font-weight: 600; }

        .back {
            background: transparent;
            color: rgba(255,255,255,0.3);
            border: 1px solid var(--glass-border);
            margin-top: 25px;
            padding: 14px;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
        }

        .back:hover { color: #fff; border-color: #fff; }

    </style>
</head>
<body>

    <!-- Grainy static texture layer -->
    <div class="grain"></div>

    <!-- GPU-Animated Background -->
    <div class="lava-wrap">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <!-- GUI Card -->
    <div class="card">
        <!-- Input View -->
        <div id="input-page">
            <h1>DadPay</h1>
            <div class="group">
                <label>Principal Amount (₹)</label>
                <input type="number" id="p" placeholder="0">
            </div>
            <div class="group">
                <label>Daily Rate (%)</label>
                <input type="number" id="r" value="5.6" step="0.1">
            </div>
            <div class="group">
                <label>Date Loan Taken</label>
                <input type="date" id="d">
            </div>
            <button class="btn" onclick="calc()">Calculate Total</button>
        </div>

        <!-- Result View -->
        <div id="res-page">
            <label>Total Balance Due</label>
            <div class="total" id="v-total">₹ 0</div>
            <div class="details">
                <div class="row"><span>Initial Loan</span><span id="v-p">₹ 0</span></div>
                <div class="row"><span>Time Elapsed</span><span id="v-t">0 Days</span></div>
                <div class="row"><span>Total Interest</span><span id="v-i">₹ 0</span></div>
            </div>
            <button class="back" onclick="show()">Adjust Inputs</button>
        </div>
    </div>

    <script>
        // Set default date to 63 days ago for accurate test results
        const dateEl = document.getElementById('d');
        const dt = new Date();
        dt.setDate(dt.getDate() - 63);
        dateEl.value = dt.toISOString().split('T')[0];

        function calc() {
            const p = parseFloat(document.getElementById('p').value);
            const r = parseFloat(document.getElementById('r').value);
            const dInput = new Date(document.getElementById('d').value);
            const today = new Date();

            if(!p || isNaN(p)) return alert("Please enter principal amount");

            // Calculate precise days
            const days = Math.ceil(Math.abs(today - dInput) / (1000 * 60 * 60 * 24));
            
            // Formula: Principal * (Daily Rate / 100) * Days
            const interest = p * (r / 100) * days;
            const total = p + interest;

            // Display results with ₹ symbol
            document.getElementById('v-total').innerText = "₹ " + Math.round(total).toLocaleString();
            document.getElementById('v-p').innerText = "₹ " + p.toLocaleString();
            document.getElementById('v-i').innerText = "₹ " + Math.round(interest).toLocaleString();
            document.getElementById('v-t').innerText = days + " Days";

            // Screen switch
            document.getElementById('input-page').style.display = 'none';
            document.getElementById('res-page').style.display = 'block';
        }

        function show() {
            document.getElementById('input-page').style.display = 'block';
            document.getElementById('res-page').style.display = 'none';
        }
    </script>
</body>
</html>
